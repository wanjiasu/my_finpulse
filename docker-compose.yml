services:
  db:
    image: postgres:16-alpine
    container_name: finpulse_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-finpulse_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: finpulse_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: .
    container_name: finpulse_api
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  worker:
    build: .
    container_name: finpulse_worker
    env_file: .env
    command: celery -A app.celery_app.celery worker -l info
    depends_on:
      - db
      - redis
    restart: unless-stopped

  beat:
    build: .
    container_name: finpulse_beat
    env_file: .env
    command: celery -A app.celery_app.celery beat -l info
    depends_on:
      - redis
    restart: unless-stopped

  flower:
    build: .
    container_name: finpulse_flower
    env_file: .env
    command: celery -A app.celery_app.celery flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
